services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: github-forks-pocketbase
    ports:
      - "8090:8090"
    volumes:
      - pocketbase-data:/pb_data
      - pocketbase-public:/pb_public
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build: .
    container_name: github-forks-app
    ports:
      - "5000:3000"
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      POCKETBASE_URL: http://pocketbase:8090
      POCKETBASE_ADMIN_EMAIL: ${POCKETBASE_ADMIN_EMAIL}
      POCKETBASE_ADMIN_PASSWORD: ${POCKETBASE_ADMIN_PASSWORD}
      NODE_ENV: production
    volumes:
      - app-data:/app/data
    depends_on:
      pocketbase:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pocketbase-data:
  pocketbase-public:
  app-data:
