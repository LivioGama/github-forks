version: '3.8'

# PocketBase lives in its own Dokploy compose service (forks-github-pocketbase)
# and is reached over HTTPS via Traefik. Don't bundle it here — a sibling PB
# in this stack would create a second empty volume and steal traffic.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: local-github-forks:latest
    restart: always
    expose:
      - 3000
    environment:
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      POCKETBASE_URL: https://forks-github-pocketbase.devliv.io
      POCKETBASE_ADMIN_EMAIL: ${POCKETBASE_ADMIN_EMAIL}
      POCKETBASE_ADMIN_PASSWORD: ${POCKETBASE_ADMIN_PASSWORD}
      NODE_ENV: production
    healthcheck:
      # Most slim Node base images ship `wget` but not `curl`; wget is safer.
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
